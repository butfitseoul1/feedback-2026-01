<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 1Q 코어밸류 피어피드백</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F2F4F6;
  --white: #fff;
  --primary: #191F28;
  --secondary: #6B7684;
  --tertiary: #B0B8C1;
  --border: #E5E8EB;
  --blue: #3182F6;
  --blue-bg: #EBF3FE;
  --up-bg: #F0F7FF;
  --up-border: #BFDBFE;
  --up-text: #1D4ED8;
  --down-bg: #F5F3FF;
  --down-border: #DDD6FE;
  --down-text: #6D28D9;
  --radius: 14px;
}
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Hero */
.hero {
  background: var(--white);
  padding: 44px 24px 30px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.hero-badge {
  display: inline-block;
  background: var(--blue-bg);
  color: var(--blue);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  letter-spacing: 0.04em;
}
.hero h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.04em;
  margin-bottom: 8px;
}
.hero-desc {
  font-size: 14px;
  color: var(--secondary);
  line-height: 1.6;
  margin-bottom: 24px;
}

/* Search */
.search-wrap {
  position: relative;
  max-width: 480px;
  margin: 0 auto;
}
.search-wrap .ico {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--tertiary);
  pointer-events: none;
  width: 20px; height: 20px;
}
#nameInput {
  width: 100%;
  padding: 15px 50px 15px 48px;
  font-size: 16px;
  font-family: inherit;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  outline: none;
  color: var(--primary);
  background: var(--bg);
  transition: border-color 0.15s, background 0.15s;
}
#nameInput:focus { border-color: var(--blue); background: var(--white); }
#nameInput::placeholder { color: var(--tertiary); }
.clear-btn {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--tertiary);
  border: none; cursor: pointer;
  color: white; font-size: 13px;
  display: none;
  align-items: center; justify-content: center;
}
.clear-btn.on { display: flex; }

/* Autocomplete */
.ac-box {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.11);
  z-index: 200;
  overflow: hidden;
  display: none;
}
.ac-box.show { display: block; }
.ac-item {
  padding: 12px 18px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  text-align: left;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: var(--bg); }
.ac-item mark { background: #FEF3C7; border-radius: 2px; padding: 0 1px; font-weight: 700; }

/* Body */
.body {
  max-width: 660px;
  margin: 0 auto;
  padding: 24px 20px 72px;
}

/* State */
.state-box { text-align: center; padding: 56px 20px; }
.state-emoji { font-size: 40px; margin-bottom: 14px; }
.state-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.state-sub { font-size: 14px; color: var(--secondary); line-height: 1.65; }

/* Result header */
.result-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
  padding: 16px 18px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
}
.user-av {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.rh-name { font-size: 17px; font-weight: 700; letter-spacing: -0.03em; }
.rh-sub { font-size: 13px; color: var(--secondary); margin-top: 3px; }

/* Section label */
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  margin-top: 4px;
}
.section-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.badge-up {
  background: var(--up-bg);
  color: var(--up-text);
  border: 1px solid var(--up-border);
}
.badge-down {
  background: var(--down-bg);
  color: var(--down-text);
  border: 1px solid var(--down-border);
}
.section-count {
  font-size: 13px;
  color: var(--tertiary);
}

/* Cards */
.card {
  background: var(--white);
  border-radius: var(--radius);
  margin-bottom: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.09); }
.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 18px 12px;
}
.tav {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.t-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
.t-dept { font-size: 12px; color: var(--secondary); margin-top: 2px; }

/* CV tag */
.cv-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  margin: 0 18px;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 600;
}
.cv-tag .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cv-사명감    { background:#FFF9F0; color:#C2540A; } .cv-사명감 .dot { background:#F59E0B; }
.cv-이타심    { background:#F0FAF4; color:#16A34A; } .cv-이타심 .dot { background:#22C55E; }
.cv-집요함    { background:#EFF6FF; color:#1D4ED8; } .cv-집요함 .dot { background:#3B82F6; }
.cv-리더-추진 { background:#F5F3FF; color:#6D28D9; } .cv-리더-추진 .dot { background:#8B5CF6; }
.cv-리더-양성 { background:#FFF1F2; color:#BE123C; } .cv-리더-양성 .dot { background:#F43F5E; }
.cv-리더-통찰 { background:#FFFBEB; color:#92400E; } .cv-리더-통찰 .dot { background:#F59E0B; }
.cv-리더-집념 { background:#F0FDF4; color:#166534; } .cv-리더-집념 .dot { background:#16A34A; }
.cv-리더-헌신 { background:#FDF4FF; color:#7E22CE; } .cv-리더-헌신 .dot { background:#A855F7; }
.cv-default   { background:#F8FAFC; color:#475569; } .cv-default .dot { background:#94A3B8; }

.card-body {
  padding: 10px 18px 16px;
}
.detail-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--tertiary);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.detail-text {
  font-size: 14px;
  color: var(--secondary);
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
}
.no-detail { font-size: 13px; color: var(--tertiary); font-style: italic; }
.no-cv { font-size: 13px; color: var(--tertiary); padding: 10px 18px 14px; font-style: italic; }

.section-gap { margin-bottom: 20px; }

/* Avatar palette */
.av-0 { background: linear-gradient(135deg,#3182F6,#60A5FA); }
.av-1 { background: linear-gradient(135deg,#10B981,#34D399); }
.av-2 { background: linear-gradient(135deg,#F59E0B,#FCD34D); }
.av-3 { background: linear-gradient(135deg,#EF4444,#FC8181); }
.av-4 { background: linear-gradient(135deg,#8B5CF6,#C4B5FD); }
.av-5 { background: linear-gradient(135deg,#EC4899,#F9A8D4); }
.av-6 { background: linear-gradient(135deg,#06B6D4,#67E8F9); }
.av-7 { background: linear-gradient(135deg,#14B8A6,#5EEAD4); }

@media(max-width:580px){
  .hero { padding: 28px 16px 22px; }
  .hero h1 { font-size: 19px; }
  .body { padding: 16px 16px 60px; }
}
</style>
</head>

function avCls(n) {
  let s = 0; for(const c of n) s += c.charCodeAt(0); return 'av-' + (s % 8);
}
function cvCls(cv) {
  if(!cv) return 'cv-default';
  if(cv.includes('사명감')) return 'cv-사명감';
  if(cv.includes('이타심')) return 'cv-이타심';
  if(cv.includes('집요함')) return 'cv-집요함';
  if(cv.includes('추진'))   return 'cv-리더-추진';
  if(cv.includes('양성'))   return 'cv-리더-양성';
  if(cv.includes('통찰'))   return 'cv-리더-통찰';
  if(cv.includes('집념'))   return 'cv-리더-집념';
  if(cv.includes('헌신'))   return 'cv-리더-헌신';
  return 'cv-default';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hlEsc(s, q) {
  const e = esc(s);
  if(!q) return e;
  return e.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
}

const writers = Object.keys(MAP);
const input = document.getElementById('nameInput');
const clearBtn = document.getElementById('clearBtn');
const acBox = document.getElementById('acBox');
const body = document.getElementById('body');

function cardHTML(t) {
  const av = avCls(t.name);
  const hasCv = !!t.core_value;
  const cc = cvCls(t.core_value);
  const hasDetail = !!(t.detail && t.detail.trim());
  return `<div class="card">
    <div class="card-top">
      <div class="tav ${av}">${esc(t.name.charAt(0))}</div>
      <div>
        <div class="t-name">${esc(t.name)}</div>
        <div class="t-dept">${esc(t.dept || '소속 미확인')}</div>
      </div>
    </div>
    ${hasCv
      ? `<div class="cv-tag ${cc}"><span class="dot"></span>${esc(t.core_value)}</div>
         <div class="card-body">
           <div class="detail-label">피드백 요청 내용</div>
           ${hasDetail ? `<div class="detail-text">${esc(t.detail.trim())}</div>` : '<div class="no-detail">별도 요청 내용 없음</div>'}
         </div>`
      : '<div class="no-cv">피드백 요청 정보 없음</div>'
    }
  </div>`;
}

function showResult(writer) {
  const d = MAP[writer];
  const up = d.up || [];
  const down = d.down || [];
  const total = up.length + down.length;
  const avCl = avCls(writer);

  let html = `<div class="result-header">
    <div class="user-av ${avCl}">${esc(writer.charAt(0))}</div>
    <div>
      <div class="rh-name">${esc(writer)}</div>
      <div class="rh-sub">피드백 작성 대상 총 ${total}명</div>
    </div>
  </div>`;

  if(up.length > 0) {
    html += `<div class="section-gap">
      <div class="section-header">
        <span class="section-badge badge-up">↑ 상향 피드백</span>
        <span class="section-count">${up.length}명</span>
      </div>
      ${up.map(cardHTML).join('')}
    </div>`;
  }

  if(down.length > 0) {
    html += `<div class="section-gap">
      <div class="section-header">
        <span class="section-badge badge-down">↓ 동료/하향 피드백</span>
        <span class="section-count">${down.length}명</span>
      </div>
      ${down.map(cardHTML).join('')}
    </div>`;
  }

  if(total === 0) {
    html += `<div class="state-box" style="padding:40px 0">
      <div class="state-emoji">📭</div>
      <div class="state-title">배정된 대상자 정보가 없어요</div>
    </div>`;
  }

  body.innerHTML = html;
}

  if(!q) { acBox.innerHTML=''; acBox.classList.remove('show'); return; }
  const matches = writers.filter(w => w.includes(q)).slice(0, 8);
  if(!matches.length) { acBox.innerHTML=''; acBox.classList.remove('show'); return; }
  acBox.innerHTML = matches.map(w =>
    `<div class="ac-item" data-name="${esc(w)}">${hlEsc(w, q)}</div>`
  ).join('');
  acBox.classList.add('show');
}

function pick(name) {
  input.value = name;
  clearBtn.classList.add('on');
  acBox.classList.remove('show');
  showResult(name);
}

input.addEventListener('input', () => {
  const q = input.value.trim();
  clearBtn.classList.toggle('on', !!input.value);
  updateAc(q);
  if(!q) showDefault();
});

input.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    const q = input.value.trim();
    acBox.classList.remove('show');
    if(!q) { showDefault(); return; }
    if(MAP[q]) { pick(q); return; }
    const m = writers.filter(w => w.includes(q));
    if(m.length === 1) pick(m[0]);
    else if(!m.length) showEmpty(q);
  }
  if(e.key === 'Escape') acBox.classList.remove('show');
});

acBox.addEventListener('click', e => {
  const item = e.target.closest('.ac-item');
  if(item) pick(item.dataset.name);
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.classList.remove('on');
  acBox.classList.remove('show');
  showDefault();
  input.focus();
});

document.addEventListener('click', e => {
  if(!e.target.closest('.search-wrap')) acBox.classList.remove('show');
});
</script>
</body>
</html>
